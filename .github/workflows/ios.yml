name: iOS Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios:
    name: Build iOS app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      # 1. Compiler la lib Rust pour arm64 (device)
      - name: Build Rust lib (arm64-apple-ios)
        run: cargo build -p monster-battle-ios --target aarch64-apple-ios --release

      # 2. Compiler la lib Rust pour x86_64 (simulator)
      - name: Build Rust lib (x86_64-apple-ios)
        run: cargo build -p monster-battle-ios --target x86_64-apple-ios --release

      # 3. Build du projet Xcode (lib déjà présente dans target/)
      - name: Build Xcode project
        run: |
          xcodebuild build \
            -project ios-app/monster-battle-ios.xcodeproj \
            -scheme monster-battle-ios \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR=../build/app

      # 4. Créer la lib universelle (device + simulator)
      - name: Create universal library (lipo)
        run: |
          mkdir -p ios-out
          lipo -create \
            target/aarch64-apple-ios/release/libmonster_battle_ios.a \
            target/x86_64-apple-ios/release/libmonster_battle_ios.a \
            -output ios-out/libmonster_battle_ios.a
          echo "✅ Universal lib : $(ls -lh ios-out/libmonster_battle_ios.a)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmonster-battle-ios
          path: ios-out/libmonster_battle_ios.a
          retention-days: 7

  build-android:
    name: Build Android check (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (ALSA + udev)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            pkg-config

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace (Linux)
        run: cargo check --workspace --exclude monster-battle-ios
