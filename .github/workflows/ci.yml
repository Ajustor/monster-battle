name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, feat/v1]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # ── Check + Test + Clippy (un seul job Linux, 3x plus rapide) ────
  check-test-lint:
    name: Check / Test / Clippy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            pkg-config

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Check workspace
        run: >
          cargo check --workspace
          --exclude monster-battle-ios
          --exclude monster-battle-android

      - name: Run tests
        run: >
          cargo test --workspace
          --exclude monster-battle-ios
          --exclude monster-battle-android

      - name: Clippy (warnings = errors)
        run: >
          cargo clippy --workspace
          --exclude monster-battle-ios
          --exclude monster-battle-android
          -- -D warnings

  # ── Check Android (cross-compile) ────────────────────────────────
  check-android:
    name: Check Android (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-ndk

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      - name: Check Android crate
        run: |
          cd crates/android
          cargo ndk -t arm64-v8a check

  # ── Build iOS (macOS) ────────────────────────────────────────────
  build-ios:
    name: Build iOS (arm64 + simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ios-

      - name: Build iOS device (arm64)
        run: cargo build -p monster-battle-ios --target aarch64-apple-ios --release

      - name: Build iOS simulator (x86_64)
        run: cargo build -p monster-battle-ios --target x86_64-apple-ios --release

      - name: Create universal library
        run: |
          mkdir -p ios-out
          lipo -create \
            target/aarch64-apple-ios/release/libmonster_battle_ios.a \
            target/x86_64-apple-ios/release/libmonster_battle_ios.a \
            -output ios-out/libmonster_battle_ios.a
          echo "✅ $(ls -lh ios-out/libmonster_battle_ios.a)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmonster-battle-ios
          path: ios-out/libmonster_battle_ios.a
          retention-days: 7
