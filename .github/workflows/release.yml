name: CI & Release

on:
  push:
    branches: [master]
    tags:
      - 'v*' # Déclenche aussi sur les tags (ex: v1.0.0)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Détection de changement de version ──────────────────────
  version-check:
    uses: Ajustor/workflows/.github/workflows/cargo-version-detect.yml@master

  # ── Release (uniquement si la version a changé OU si c'est un tag) ─────────────
  release-server:
    needs: version-check
    if: needs.version-check.outputs.version_changed == 'true'
    uses: Ajustor/workflows/.github/workflows/cargo-monorepo-release.yml@master
    with:
      targets: '["windows", "linux", "macos"]'
      version: ${{ needs.version-check.outputs.new_version }}
      package_name: monster-battle-server
      package_path: crates/server

  release-client:
    needs: version-check
    if: needs.version-check.outputs.version_changed == 'true'
    uses: Ajustor/workflows/.github/workflows/cargo-monorepo-release.yml@master
    with:
      targets: '["windows", "linux", "macos"]'
      version: ${{ needs.version-check.outputs.new_version }}
      package_name: monster-battle
      package_path: crates/tui
      deploy_pages: true
      linux_apt_packages: libasound2-dev

  # ── Release Android APK ────────────────────────────────────────
  release-android:
    needs: version-check
    if: needs.version-check.outputs.version_changed == 'true'
    uses: Ajustor/workflows/.github/workflows/bevy-android-release.yml@master
    with:
      package_name: monster-battle-android
      package_path: crates/android
      app_name: Monster Battle
      version: ${{ needs.version-check.outputs.new_version }}
      build_system: xbuild
      target_sdk: '36'
      min_sdk: '24'
      ndk_version: '29.0.14206865'
      build_tools_version: '36.0.0'
      manifest_path: crates/android/AndroidManifest.xml
      res_dir: crates/android/res
      inject_resources_script: scripts/inject_resources.py
      deploy_pages: true
      sign_apk: true
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
